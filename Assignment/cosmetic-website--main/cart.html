<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — ShopZone</title>
  <link rel="stylesheet" href="STYLE.CSS" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">🛍️ ShopZone</div>
    <div class="nav-right">
      <a href="index.html" class="back-btn">← Continue Shopping</a>
      <a href="cart.html" class="cart-btn">
        🛒 Cart <span class="cart-count" id="cartCount">0</span>
      </a>
    </div>
  </nav>

  <main class="cart-page">
    <h2 class="cart-title">Your Cart</h2>

    <div class="cart-layout">
      <!-- CART ITEMS -->
      <div id="cartItems" class="cart-items">
        <div class="loader">Loading cart…</div>
      </div>

      <!-- BILL SUMMARY -->
      <aside class="bill-summary" id="billSummary">
        <h3>Bill Summary</h3>
        <div class="bill-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
        <div class="bill-row"><span>Discount (10%)</span><span id="discount" class="discount">-₹0</span></div>
        <div class="bill-row"><span>Delivery</span><span id="delivery">₹40</span></div>
        <div class="bill-divider"></div>
        <div class="bill-row total"><span>Total</span><span id="total">₹0</span></div>
        <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout →</button>
        <p class="secure-note">🔒 Secure checkout</p>
      </aside>
    </div>
  </main>

  <script src="js/cart.js"></script>
  <script src="js/cartPage.js"></script>
</body>
</html>
